# ===== APPLICATION =====
spring.application.name=tourplanner-backend
server.port=8080

# ===== DATABASE (PostgreSQL) =====
# ?? WICHTIG: Diese Werte NICHT committen!
# Verwende Umgebungsvariablen oder application-dev.properties lokal
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tourplanner}
spring.datasource.username=${DB_USERNAME:tourplanner}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA/HIBERNATE =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== LOGGING (log4j2) =====
logging.config=classpath:log4j2.xml

# ===== OPEN ROUTE SERVICE API =====
openrouteservice.api.key=${ORS_API_KEY:}
openrouteservice.api.url=https://api.openrouteservice.org/v2

# ===== FILE UPLOAD (for images) =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
image.storage.path=${IMAGE_STORAGE_PATH:./images}

# ===== PROFILES =====
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
