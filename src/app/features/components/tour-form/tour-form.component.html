<div class="tour-form-container">
  <h2>{{ isEditMode ? 'Edit Tour' : 'Create New Tour' }}</h2>

  <div *ngIf="error" class="error-message">
    ❌ {{ error }}
  </div>

  <form (ngSubmit)="onSubmit()" class="tour-form">
    <!-- Name -->
    <div class="form-group">
      <label for="name">Tour Name *</label>
      <input
        type="text"
        id="name"
        [(ngModel)]="tour.name"
        name="name"
        required
        placeholder="Enter tour name"
      >
    </div>

    <!-- Description -->
    <div class="form-group">
      <label for="description">Description</label>
      <textarea
        id="description"
        [(ngModel)]="tour.description"
        name="description"
        rows="3"
        placeholder="Enter description"
      ></textarea>
    </div>

    <!-- Locations -->
    <div class="form-row">
      <div class="form-group">
        <label for="fromLocation">From Location *</label>
        <input
          type="text"
          id="fromLocation"
          [(ngModel)]="tour.fromLocation"
          name="fromLocation"
          required
          placeholder="Starting point"
        >
      </div>

      <div class="form-group">
        <label for="toLocation">To Location *</label>
        <input
          type="text"
          id="toLocation"
          [(ngModel)]="tour.toLocation"
          name="toLocation"
          required
          placeholder="Destination"
        >
      </div>
    </div>

    <!-- Transport Type -->
    <div class="form-group">
      <label for="transportType">Transport Type</label>
      <select
        id="transportType"
        [(ngModel)]="tour.transportType"
        name="transportType"
      >
        <option *ngFor="let type of transportTypes" [value]="type">
          {{ type }}
        </option>
      </select>
    </div>

    <!-- Distance & Time -->
    <div class="form-row">
      <div class="form-group">
        <label for="distance">Distance (km)</label>
        <input
          type="number"
          id="distance"
          [(ngModel)]="tour.distance"
          name="distance"
          min="0"
          step="0.1"
          placeholder="0.0"
        >
      </div>

      <div class="form-group">
        <label for="estimatedTime">Estimated Time (minutes)</label>
        <input
          type="number"
          id="estimatedTime"
          [(ngModel)]="tour.estimatedTime"
          name="estimatedTime"
          min="0"
          placeholder="0"
        >
      </div>
    </div>

    <!-- Buttons -->
    <div class="form-actions">
      <button type="button" (click)="onCancel()" class="btn-secondary">
        Cancel
      </button>
      <button type="submit" [disabled]="saving" class="btn-primary">
        {{ saving ? 'Saving...' : (isEditMode ? 'Update Tour' : 'Create Tour') }}
      </button>
    </div>
  </form>
</div>
